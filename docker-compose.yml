services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: peblo
      POSTGRES_PASSWORD: peblo
      POSTGRES_DB: peblo_infinityos
    ports:
      - "5432:5432"
    volumes:
      - peblo_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - peblo_redis_data:/data

volumes:
  peblo_pg_data:
  peblo_redis_data:
