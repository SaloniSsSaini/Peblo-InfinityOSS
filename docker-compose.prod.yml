# Production — one command:  npm run deploy
# Requires: Docker + .env.deploy (auto-created by scripts/deploy.ps1)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: peblo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: peblo_infinityos
    volumes:
      - peblo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U peblo -d peblo_infinityos']
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - peblo_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://peblo:${POSTGRES_PASSWORD}@postgres:5432/peblo_infinityos?schema=public
      REDIS_URL: redis://redis:6379
      WEB_ORIGIN: ${WEB_ORIGIN}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      DEMO_EMAIL: ${DEMO_EMAIL:-demo@peblo.infinityos.app}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-DemoInfinity2026!}
      DEMO_NAME: ${DEMO_NAME:-Demo visitor}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RUN_DB_SEED: ${RUN_DB_SEED:-1}
    ports:
      - '${API_PORT:-4000}:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
    ports:
      - '${WEB_PORT:-3000}:3000'

volumes:
  peblo_pg_data:
  peblo_redis_data:
